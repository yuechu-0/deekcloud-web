    <style>
        ::-webkit-scrollbar { width: 0px; background: transparent; }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 15s infinite alternate ease-in-out; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }

        /* 左侧菜单平滑过渡 */
        .menu-item { transition: all 0.3s ease; }
        
        /* 折叠菜单过渡 */
        .submenu-content {
            transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
        }
        .submenu-open .submenu-content {
            max-height: 500px;
            opacity: 1;
        }
        .chevron { transition: transform 0.3s ease; }
        .submenu-open .chevron { transform: rotate(180deg); }

        /* 文档正文排版优化 */
        .doc-content h2 { font-size: 1.25rem; font-weight: bold; color: #1f2937; margin-top: 2.5rem; margin-bottom: 1.25rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 0.5rem;}
        .doc-content h3 { font-size: 1.1rem; font-weight: 600; color: #374151; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .doc-content h4 { font-size: 1rem; font-weight: 600; color: #4b5563; margin-top: 1.25rem; margin-bottom: 0.5rem; }
        .doc-content p { color: #4b5563; line-height: 1.75; margin-bottom: 1rem; font-size: 0.95rem; }
        .doc-content ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1rem; color: #4b5563; }
        .doc-content li { margin-bottom: 0.5rem; font-size: 0.95rem; line-height: 1.6;}
        
        /* 强制取消下划线 */
        .doc-content a { color: #4f46e5; text-decoration: none !important; transition: color 0.2s; }
        .doc-content a:hover { color: #3730a3; text-decoration: none !important; }
        
        /* 玻璃态通用类 */
        .glass-panel {

            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);

    <script>
        // === Toast 提示功能 ===
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = `fixed top-24 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-lg text-white text-sm z-[9999] transition-all duration-300 opacity-0 translate-y-[-20px] flex items-center ${isError ? 'bg-red-500' : 'bg-emerald-500'}`;
            
            const iconSvg = isError 
                ? `<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
                : `<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
            
            toast.innerHTML = `${iconSvg} <span>${message}</span>`;
            document.body.appendChild(toast);

            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('opacity-0', 'translate-y-[-20px]');
                toast.classList.add('opacity-100', 'translate-y-0');
            });

            // Remove after 2.5 seconds
            setTimeout(() => {
                toast.classList.remove('opacity-100', 'translate-y-0');
                toast.classList.add('opacity-0', 'translate-y-[-20px]');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('链接已复制到剪贴板');
                }).catch(err => {
                    showToast('复制失败', true);
                    console.error('Failed to copy text: ', err);
                });
            } else {
                // 回退方案
                let textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast('链接已复制到剪贴板');
                } catch (err) {
                    showToast('复制失败', true);
                }
                textArea.remove();
            }
        }

        // === 生成表格辅助函数 ===

                        ${item.name}
                    </td>
                    <td class="py-4 px-6 text-[14px]">
                        <div class="flex items-center justify-between min-w-[300px]">
                            <a href="${item.url}" target="_blank" class="text-blue-500 hover:text-blue-600 transition-colors truncate max-w-[400px]" style="text-decoration:none;">
                                ${item.url}
                            </a>
                            <button onclick="copyToClipboard('${item.url}')" class="ml-4 p-1.5 rounded-full border border-gray-200 text-gray-500 hover:bg-gray-50 hover:text-primary transition-all focus:outline-none focus:ring-2 focus:ring-primary/20 flex-shrink-0" title="复制链接">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `).join('');

            return `
                <h2 class="text-xl font-bold mt-10 mb-5 !border-none !pb-0">${title}</h2>
                <div class="border border-gray-100 rounded-lg overflow-x-auto bg-white mb-6">

                                <th class="py-3 px-6 text-sm font-semibold text-gray-500">链接</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        const docData = {

            const container = button.closest('.submenu-container');
            container.classList.toggle('submenu-open');
        }

        // 路由渲染逻辑
        document.addEventListener('DOMContentLoaded', () => {
            const docBody = document.getElementById('doc-body');
            const navItems = document.querySelectorAll('.menu-item');

            function renderContent() {
                let hash = window.location.hash.substring(1);
                if (!hash || !docData[hash]) {
                    hash = 'home';
                }

                // 注入数据
                const data = docData[hash];
                
                // 淡入淡出动画
                docBody.style.opacity = 0;
                setTimeout(() => {
                    docBody.innerHTML = data.content;
                    docBody.style.transition = 'opacity 0.3s ease-in-out';
                    docBody.style.opacity = 1;
                    window.scrollTo({top: 0, behavior: 'smooth'});
                }, 150);

                // 更新左侧菜单高亮状态及背景
                navItems.forEach(item => {
                    const itemHash = item.getAttribute('data-hash');
                    
                    if (itemHash === hash) {
                        item.classList.add('bg-blue-50/80', 'text-primary');
                        item.classList.remove('text-gray-600', 'text-gray-500');
                        
                        // 展开对应的父级菜单
                        const parentContainer = item.closest('.submenu-container');
                        if(parentContainer && !parentContainer.classList.contains('submenu-open')) {
                            parentContainer.classList.add('submenu-open');
                        }
                    } else {
                        item.classList.remove('bg-blue-50/80', 'text-primary');
                        if (item.classList.contains('py-3')) { // 顶级菜单
                            item.classList.add('text-gray-600');
                        } else {
                            item.classList.add('text-gray-500');
                        }
                    }
                });
            }

            renderContent();
            window.addEventListener('hashchange', renderContent);
        });
